<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FAHRI MARKET</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
}

input{
background:#334155;
color:white;
}

button{
background:#7c3aed;
color:white;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.product{
background:#111827;
border-radius:20px;
overflow:hidden;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product-body{
padding:15px;
}
</style>
</head>
<body>

<div id="loginPage" class="page active">

<div class="card">
<h2>LOGIN</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Masuk</button>
<button onclick="showRegister()">Daftar</button>
</div>

</div>

<div id="registerPage" class="page">

<div class="card">
<h2>DAFTAR</h2>

<input id="regUsername" placeholder="Username">
<input id="regEmail" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">

<button onclick="register()">Daftar</button>
<button onclick="showLogin()">Kembali Login</button>
</div>

</div>

<div id="dashboardPage" class="page">

<div class="card">
<h2 id="welcomeText">Loading...</h2>

<button onclick="logout()">Logout</button>

<button id="sellerBtn"
style="display:none"
onclick="openSeller()">
Panel Seller
</button>

</div>

<div id="productList" class="grid"></div>

</div>

<div id="adminPage" class="page">

<div class="card">
<h2>ADMIN PANEL</h2>

<input id="productName" placeholder="Nama Produk">
<input id="productPrice" placeholder="Harga">
<input id="productImage" placeholder="Link Gambar">

<button onclick="addProduct()">
Tambah Produk
</button>

</div>

<div id="adminProductList" class="grid"></div>

</div>

<div id="sellerPage" class="page">

<div class="card">

<h2>UPLOAD PRODUK</h2>

<input id="vipName" placeholder="Nama Produk">
<input id="vipPrice" placeholder="Harga">
<input id="vipImage" placeholder="Link Gambar">

<button onclick="uploadVipProduct()">
Upload
</button>

<button onclick="backDashboard()">
Kembali
</button>

</div>

<div id="myProducts" class="grid"></div>

</div>

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
addDoc,
getDocs,
query,
where
} from
"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",
  authDomain: "fashion-fahri-39262.firebaseapp.com",
  databaseURL: "https://fashion-fahri-39262-default-rtdb.firebaseio.com",
  projectId: "fashion-fahri-39262",
  storageBucket: "fashion-fahri-39262.firebasestorage.app",
  messagingSenderId: "647011821518",
  appId: "1:647011821518:web:279811ff7821e75bf32d9f",
  measurementId: "G-4491S31VK2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginPage=document.getElementById("loginPage");
const registerPage=document.getElementById("registerPage");
const dashboardPage=document.getElementById("dashboardPage");
const adminPage=document.getElementById("adminPage");
const sellerPage=document.getElementById("sellerPage");

function hideAll(){
document
.querySelectorAll(".page")
.forEach(x=>x.classList.remove("active"));
}

window.showRegister=()=>{
hideAll();
registerPage.classList.add("active");
}

window.showLogin=()=>{
hideAll();
loginPage.classList.add("active");
}

window.register=async()=>{

try{

const username=
regUsername.value;

const email=
regEmail.value;

const password=
regPassword.value;

const user=
await createUserWithEmailAndPassword(
auth,
email,
password
);

await setDoc(
doc(db,"users",user.user.uid),
{
username,
email,
role:"member"
});

alert("Berhasil daftar");

showLogin();

}catch(e){
alert(e.message);
}

}

window.login=async()=>{

try{

const email=
loginEmail.value;

const password=
loginPassword.value;

if(
email==="admin" &&
password==="admin123"
){
hideAll();
adminPage.classList.add("active");
loadProducts();
return;
}

await signInWithEmailAndPassword(
auth,
email,
password
);

}catch(e){
alert(e.message);
}

}

window.logout=async()=>{
await signOut(auth);
location.reload();
}

onAuthStateChanged(
auth,
async(user)=>{

if(!user) return;

const snap=
await getDoc(
doc(db,"users",user.uid)
);

const data=snap.data();

hideAll();
dashboardPage.classList.add("active");

welcomeText.innerHTML=
"Halo "+data.username;

if(data.role==="vip"){
sellerBtn.style.display="block";
}

loadProducts();

});

window.addProduct=async()=>{

await addDoc(
collection(db,"products"),
{
name:productName.value,
price:productPrice.value,
image:productImage.value,
seller:"ADMIN",
sellerRole:"admin"
});

alert("Produk berhasil ditambah");

loadProducts();

}

async function loadProducts(){

const snap=
await getDocs(
collection(db,"products")
);

let html="";

snap.forEach((d)=>{

const p=d.data();

html+=`
<div class="product">

<img src="${p.image}">

<div class="product-body">

<h3>${p.name}</h3>

<p>Rp ${p.price}</p>

<p>${p.sellerRole}</p>

</div>

</div>
`;

});

productList.innerHTML=html;
adminProductList.innerHTML=html;

}

window.openSeller=()=>{
hideAll();
sellerPage.classList.add("active");
loadMyProducts();
}

window.backDashboard=()=>{
hideAll();
dashboardPage.classList.add("active");
}

window.uploadVipProduct=
async()=>{

const user=
auth.currentUser;

await addDoc(
collection(db,"products"),
{
name:vipName.value,
price:vipPrice.value,
image:vipImage.value,
sellerUid:user.uid,
sellerRole:"vip"
});

alert("Produk berhasil diupload");

loadMyProducts();
loadProducts();

}

async function loadMyProducts(){

const user=
auth.currentUser;

const q=query(
collection(db,"products"),
where(
"sellerUid",
"==",
user.uid
)
);

const snap=
await getDocs(q);

let html="";

snap.forEach((d)=>{

const p=d.data();

html+=`
<div class="product">

<img src="${p.image}">

<div class="product-body">

<h3>${p.name}</h3>

<p>Rp ${p.price}</p>

</div>

</div>
`;

});

myProducts.innerHTML=html;

}

</script>

</body>
  </html>
