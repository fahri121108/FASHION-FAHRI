<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FAHRI FASHION STORE</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

margin:0;

background:
linear-gradient(135deg,#070b18,#151d3b,#250d3d);

color:white;

}


/* LOGIN */

#authPage{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}



.box{

width:360px;

background:
rgba(25,30,55,.9);

padding:25px;

border-radius:20px;

box-shadow:
0 0 30px rgba(124,58,237,.5);

}



h1{

text-align:center;

background:
linear-gradient(
90deg,
#60a5fa,
#c084fc
);

-webkit-background-clip:text;

color:transparent;

}



input{

width:100%;

padding:13px;

margin-top:12px;

border-radius:12px;

border:none;

background:#090f22;

color:white;

}



button{

width:100%;

padding:13px;

margin-top:12px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

color:white;

background:
linear-gradient(
90deg,
#4f46e5,
#9333ea
);

}



.link{

text-align:center;

margin-top:15px;

color:#aaa;

cursor:pointer;

}



/* DASHBOARD ADMIN */


#adminPage,
#userPage{

display:none;

}



.header{

padding:20px;

background:#111827;

text-align:center;

border-bottom:1px solid #6366f1;

}



.container{

padding:20px;

max-width:1200px;

margin:auto;

}



.card{

background:
rgba(25,30,55,.9);

padding:20px;

border-radius:20px;

margin-bottom:20px;

}



.grid{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));

gap:20px;

}



.product{

background:#1e293b;

padding:15px;

border-radius:15px;

}



.product img{

width:100%;

height:250px;

object-fit:cover;

border-radius:12px;

}



select{

width:100%;

padding:13px;

margin-top:10px;

border-radius:12px;

background:#090f22;

color:white;

}



</style>

</head>


<body>



<!-- LOGIN REGISTER -->


<div id="authPage">


<div class="box">


<h1>
FAHRI STORE
</h1>


<input id="email"
placeholder="Email">


<input id="password"
type="password"
placeholder="Password">



<button onclick="login()">
LOGIN
</button>


<button onclick="register()">
DAFTAR
</button>



<p id="msg"></p>


</div>


</div>





<!-- ADMIN -->


<div id="adminPage">


<div class="header">

<h1>
👑 ADMIN DASHBOARD
</h1>

</div>


<div class="container">


<div class="card">

<h2>
Tambah Produk
</h2>


<input id="nama"
placeholder="Nama Outfit">


<select id="kategori">

<option>Baju</option>

<option>Celana</option>

<option>Setelan</option>

</select>


<input id="harga"
placeholder="Harga Robux">


<input id="gambar"
placeholder="Link Gambar">


<input id="link"
placeholder="Link Roblox">


<button onclick="tambahProduk()">
Tambah Produk
</button>


   </div>
   <button onclick="logout()">
🚪 LOGOUT
</button>

</div>

</div>




<!-- USER STORE -->


<div id="userPage">


<div class="header">

<h1>
🛍️ FAHRI FASHION STORE
</h1>


<button onclick="logout()">
🚪 LOGOUT
</button>


</div>



<div class="container">


<div class="card">

<h2>
🔥 Katalog Outfit
</h2>


<div id="userProducts" class="grid">

</div>


</div>


</div>


</div>




<script type="module">


import { initializeApp }

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

collection,

addDoc,

getDocs

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {


apiKey:
"AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",


authDomain:
"fashion-fahri-39262.firebaseapp.com",


projectId:
"fashion-fahri-39262",


storageBucket:
"fashion-fahri-39262.firebasestorage.app",


messagingSenderId:
"647011821518",


appId:
"1:647011821518:web:279811ff7821e75bf32d9f",


measurementId:
"G-4491S31VK2"


};



const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);



const db =
getFirestore(app);





/* ADMIN AKUN */


const ADMIN_EMAIL =
"Fahri@admin.com";

const ADMIN_PASSWORD =
"Fahz121108";







/* REGISTER USER */


window.register =
async function(){


try{


await createUserWithEmailAndPassword(

auth,

document.getElementById("email").value,

document.getElementById("password").value

);



alert(
"Daftar berhasil, silahkan login"
);



}catch(e){


alert(e.message);


}


};







/* LOGIN */


window.login =
async function(){


try{


let email =
document.getElementById("email").value;


let pass =
document.getElementById("password").value;



await signInWithEmailAndPassword(

auth,

email,

pass

);



if(

email === ADMIN_EMAIL

&&

pass === ADMIN_PASSWORD

){



document.getElementById("authPage")
.style.display="none";



document.getElementById("adminPage")
.style.display="block";



}else{


document.getElementById("authPage")
.style.display="none";



document.getElementById("userPage")
.style.display="block";



loadUserProducts();



}



}catch(e){


alert(
"Login gagal : "+e.message
);


}


};







/* LOGOUT */


window.logout =
async function(){


await signOut(auth);



location.reload();


};
   



/* TAMBAH PRODUK ADMIN */

window.tambahProduk =
async function(){


await addDoc(

collection(db,"outfits"),

{


nama:
document.getElementById("nama").value,


kategori:
document.getElementById("kategori").value,


harga:
document.getElementById("harga").value,


gambar:
document.getElementById("gambar").value,


link:
document.getElementById("link").value


}

);



alert(
"Produk berhasil ditambahkan"
);



loadUserProducts();



};







/* TAMPIL PRODUK USER */


async function loadUserProducts(){


const data =
await getDocs(

collection(db,"outfits")

);



let html="";



data.forEach(doc=>{


let p =
doc.data();



html += `


<div class="product">


<img src="${p.gambar}">


<h3>
${p.nama}
</h3>


<p>
${p.kategori}
</p>


<p>
💎 ${p.harga} Robux
</p>



<a href="${p.link}" target="_blank">


<button>
BELI SEKARANG
</button>


</a>



</div>


`;



});



document.getElementById("userProducts")
.innerHTML = html;



}



</script>


</body>

</html>
