<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FAHRI FASHION STORE</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    margin:0;

    min-height:100vh;

    color:white;

    background:
    radial-gradient(circle at top,#4338ca,transparent 40%),
    linear-gradient(
    135deg,
    #050816,
    #111827,
    #1e1b4b
    );

}



/* =================
 LOGIN PAGE
================= */


#authPage{

    height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;

    padding:20px;

}



.login-panel{

    width:380px;

    padding:35px;

    border-radius:25px;


    background:

    rgba(255,255,255,.08);


    backdrop-filter:blur(20px);


    border:

    1px solid

    rgba(255,255,255,.15);



    box-shadow:

    0 0 40px

    rgba(99,102,241,.5);


}



.logo{

    text-align:center;

    font-size:32px;

    font-weight:bold;


    background:

    linear-gradient(
    90deg,
    #60a5fa,
    #c084fc
    );


    -webkit-background-clip:text;

    color:transparent;


}



.subtitle{

    text-align:center;

    color:#cbd5e1;

    margin-bottom:25px;

}



input,
select{


    width:100%;

    padding:14px;

    margin-top:12px;


    border-radius:14px;


    border:none;


    outline:none;


    color:white;


    background:

    rgba(0,0,0,.35);


    border:

    1px solid

    rgba(255,255,255,.15);


}



button{


    width:100%;

    padding:14px;

    margin-top:15px;


    border:none;


    border-radius:14px;


    cursor:pointer;


    font-weight:bold;


    color:white;


    background:

    linear-gradient(
    90deg,
    #4f46e5,
    #9333ea
    );


    transition:.3s;


}



button:hover{

    transform:translateY(-2px);

    box-shadow:

    0 0 20px

    #9333ea;

}



#msg{

    text-align:center;

    color:#cbd5e1;

}





/* =================
 DASHBOARD
================= */


#adminPage,
#userPage{

    display:none;

}



.sidebar{


    position:fixed;


    left:0;


    top:0;


    width:250px;


    height:100vh;


    padding:25px;



    background:

    rgba(15,23,42,.85);


    backdrop-filter:blur(15px);


    border-right:

    1px solid

    rgba(255,255,255,.1);


}



.sidebar h2{

    text-align:center;

}



.menu button{

    margin-top:15px;

}





.main{


    margin-left:250px;


    padding:30px;


}





.card{


    background:

    rgba(255,255,255,.08);


    backdrop-filter:blur(15px);


    border-radius:20px;


    padding:20px;


    margin-bottom:20px;


    border:

    1px solid

    rgba(255,255,255,.1);


}





.stats{


    display:grid;


    grid-template-columns:

    repeat(auto-fit,minmax(200px,1fr));


    gap:20px;


}



.stat{


    padding:25px;


    border-radius:20px;


    background:

    linear-gradient(
    135deg,
    #1e293b,
    #312e81
    );


}





.products{


    display:grid;


    grid-template-columns:

    repeat(auto-fill,minmax(220px,1fr));


    gap:20px;


}



.product{


    background:

    rgba(255,255,255,.08);


    padding:15px;


    border-radius:20px;


}





.product img{


    width:100%;


    height:260px;


    object-fit:cover;


    border-radius:15px;


}


</style>

</head>

<body>


<!-- LANJUT BAGIAN 2 -->
   
<!-- AUTH & FIREBASE -->


<div id="firebaseArea"></div>


<script type="module">


import { initializeApp }

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

collection,

addDoc,

getDocs,

doc,

setDoc,

getDoc,

deleteDoc,

updateDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {


apiKey:
"AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",


authDomain:
"fashion-fahri-39262.firebaseapp.com",


projectId:
"fashion-fahri-39262",


storageBucket:
"fashion-fahri-39262.firebasestorage.app",


messagingSenderId:
"647011821518",


appId:
"1:647011821518:web:279811ff7821e75bf32d9f",


measurementId:
"G-4491S31VK2"

};



const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);



const db =
getFirestore(app);





/* ADMIN LOGIN */


const ADMIN_EMAIL =
"Fahri@admin.com";


const ADMIN_PASSWORD =
"Fahz121108";





/* REGISTER */


window.register = async function(){


try{


let email =
document.getElementById("email").value;



let password =
document.getElementById("password").value;




let user =

await createUserWithEmailAndPassword(

auth,

email,

password

);



await setDoc(

doc(

db,

"users",

user.user.uid

),

{

email:email,

role:"user",

createdAt:
new Date()

}


);



alert(
"Daftar berhasil, silahkan login"
);



}catch(e){


alert(e.message);


}


};








/* LOGIN */


window.login = async function(){


try{


let email =

document.getElementById("email").value;



let password =

document.getElementById("password").value;



await signInWithEmailAndPassword(

auth,

email,

password

);



if(

email === ADMIN_EMAIL &&

password === ADMIN_PASSWORD

){


document.getElementById("authPage")
.style.display="none";



document.getElementById("adminPage")
.style.display="block";



loadAdminProducts();



}

else{


document.getElementById("authPage")
.style.display="none";


document.getElementById("userPage")
.style.display="block";



loadUserProducts();


}



}catch(e){


alert(
"Login gagal : "+e.message
);


}


};








/* LOGOUT */


window.logout = async function(){


await signOut(auth);


location.reload();


};
   
<!-- ADMIN PAGE -->


<div id="adminPage">


<div class="sidebar">


<h2>
👑 FAHRI ADMIN
</h2>


<div class="menu">


<button onclick="showAdminHome()">
📊 Dashboard
</button>


<button onclick="showAdminProduct()">
📦 Produk
</button>


<button onclick="logout()">
🚪 Logout
</button>


</div>


</div>



<div class="main">


<div class="card">


<h1>
Dashboard Admin
</h1>


<p>
Selamat datang di FAHRI FASHION STORE
</p>


</div>




<div class="stats">


<div class="stat">

<h3>
Produk
</h3>

<h1 id="totalProduk">
0
</h1>

</div>



<div class="stat">

<h3>
User
</h3>

<h1 id="totalUser">
0
</h1>

</div>



<div class="stat">

<h3>
Order
</h3>

<h1 id="totalOrder">
0
</h1>

</div>



<div class="stat">

<h3>
Kunjungan
</h3>

<h1 id="totalVisit">
0
</h1>

</div>


</div>





<div class="card">


<h2>
➕ Tambah / Edit Produk
</h2>



<input id="productId" hidden>


<input id="namaProduk"
placeholder="Nama Outfit">



<select id="kategoriProduk">


<option>Baju</option>

<option>Celana</option>

<option>Setelan</option>


</select>



<input id="hargaProduk"
placeholder="Harga Robux">



<input id="gambarProduk"
placeholder="Link Thumbnail">



<input id="linkProduk"
placeholder="Link Roblox">



<button onclick="saveProduct()">
SIMPAN PRODUK
</button>



</div>






<div class="card">


<h2>
📦 Semua Produk
</h2>



<div id="adminProducts" class="products">


</div>


</div>




</div>


</div>









<script>


/* SIMPAN PRODUK */


window.saveProduct = async function(){


let id =

document.getElementById("productId").value;



let data = {


nama:

document.getElementById("namaProduk").value,


kategori:

document.getElementById("kategoriProduk").value,


harga:

document.getElementById("hargaProduk").value,


gambar:

document.getElementById("gambarProduk").value,


link:

document.getElementById("linkProduk").value


};





if(id){



await updateDoc(

doc(db,"products",id),

data

);



alert(
"Produk berhasil diubah"
);



}

else{



await addDoc(

collection(db,"products"),

data

);



alert(
"Produk berhasil ditambah"
);



}



loadAdminProducts();


};







/* LOAD ADMIN PRODUK */


window.loadAdminProducts = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";


let jumlah=0;



data.forEach(item=>{


jumlah++;



let p=item.data();



html += `


<div class="product">


<img src="${p.gambar}">


<h3>${p.nama}</h3>


<p>
${p.kategori}
</p>


<p>
💎 ${p.harga} Robux
</p>



<button onclick="editProduct('${item.id}')">
✏️ EDIT
</button>


<button onclick="hapusProduct('${item.id}')">
🗑️ HAPUS
</button>


</div>


`;



});



document.getElementById("adminProducts").innerHTML=html;


document.getElementById("totalProduk").innerHTML=jumlah;


};





/* EDIT */


window.editProduct = async function(id){


let snap = await getDoc(

doc(db,"products",id)

);



let p=snap.data();



document.getElementById("productId").value=id;


document.getElementById("namaProduk").value=p.nama;


document.getElementById("kategoriProduk").value=p.kategori;


document.getElementById("hargaProduk").value=p.harga;


document.getElementById("gambarProduk").value=p.gambar;


document.getElementById("linkProduk").value=p.link;


};





/* HAPUS */


window.hapusProduct = async function(id){


if(confirm("Hapus produk ini?")){


await deleteDoc(

doc(db,"products",id)

);



loadAdminProducts();


}


};
   
<!-- USER PAGE -->


<div id="userPage">


<div class="header">


<h1>
🛍️ FAHRI FASHION STORE
</h1>


<button onclick="logout()">
🚪 LOGOUT
</button>


</div>





<div class="container">


<div class="card">


<h2>
🔥 Katalog Outfit
</h2>



<div id="userProducts" class="products">

</div>



</div>


</div>


</div>







<script>


/* LOAD PRODUK USER */


window.loadUserProducts = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";



data.forEach(item=>{


let p=item.data();



html += `


<div class="product">


<img src="${p.gambar}">


<h3>
${p.nama}
</h3>



<p>
Kategori:
${p.kategori}
</p>



<p>
💎 ${p.harga} Robux
</p>



<button onclick="orderProduct(
'${item.id}',
'${p.nama}',
'${p.harga}'
)">
🛒 ORDER
</button>



</div>


`;



});



document.getElementById("userProducts").innerHTML=html;


};







/* BUAT ORDER */


window.orderProduct = async function(
id,
nama,
harga
){


let user = auth.currentUser;



await addDoc(

collection(db,"orders"),

{


user:

user.email,


produk:

nama,


harga:

harga,


status:

"Pending",


tanggal:

new Date()



}


);



alert(

"Order berhasil dikirim"

);


};






/* HITUNG USER */


async function countUser(){


let data = await getDocs(

collection(db,"users")

);



document.getElementById("totalUser").innerHTML =
data.size;


}






/* HITUNG ORDER */


async function countOrder(){


let data = await getDocs(

collection(db,"orders")

);



document.getElementById("totalOrder").innerHTML =
data.size;


}





countUser();

countOrder();


</script>

<script>


/* =========================
   TOTAL KUNJUNGAN
========================= */


async function addVisit(){


let ref = doc(
db,
"stats",
"website"
);



let data = await getDoc(ref);



if(data.exists()){


await updateDoc(

ref,

{

visits:
data.data().visits + 1

}

);


}

else{


await setDoc(

ref,

{

visits:1

}

);


}


}



async function loadVisit(){


let data = await getDoc(

doc(
db,
"stats",
"website"
)

);



if(data.exists()){


document.getElementById("totalVisit")
.innerHTML =
data.data().visits;


}


}



addVisit();

loadVisit();







/* =========================
   LIHAT ORDER ADMIN
========================= */


async function loadOrders(){


let data = await getDocs(

collection(db,"orders")

);



let html="";



data.forEach(item=>{


let o=item.data();



html += `


<div class="card">


<h3>
🛒 ORDER
</h3>


<p>
User:
${o.user}
</p>


<p>
Produk:
${o.produk}
</p>


<p>
Harga:
${o.harga} Robux
</p>


<p>
Status:
${o.status}
</p>



</div>


`;



});



let area =
document.getElementById("orders");



if(area){

area.innerHTML=html;

}



}







/* DASHBOARD LOAD */


window.showAdminHome=function(){


countUser();

countOrder();

loadVisit();

loadOrders();


};





window.showAdminProduct=function(){


loadAdminProducts();


};




</script>
