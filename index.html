<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FAHRI FASHION STORE</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
min-height:100vh;
color:white;

background:
radial-gradient(circle at top,#7c3aed,transparent 35%),
linear-gradient(
135deg,
#020617,
#111827,
#312e81
);

}



/* =================
LOGIN REGISTER
================= */


.page{

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}



.box{


width:380px;

padding:35px;

border-radius:25px;


background:

rgba(255,255,255,.08);


backdrop-filter:blur(20px);


border:

1px solid rgba(255,255,255,.15);



box-shadow:

0 0 40px rgba(124,58,237,.5);


}



.logo{


text-align:center;

font-size:35px;

font-weight:900;


background:

linear-gradient(
90deg,
#38bdf8,
#c084fc
);


-webkit-background-clip:text;

color:transparent;


}



.text{

text-align:center;

color:#cbd5e1;

}




input,select{


width:100%;

padding:14px;

margin-top:12px;

border-radius:12px;

border:none;

outline:none;


background:

rgba(0,0,0,.4);


color:white;


}




button{


width:100%;

padding:14px;

margin-top:15px;

border:0;

border-radius:12px;


background:

linear-gradient(
90deg,
#2563eb,
#9333ea
);


color:white;

font-weight:bold;

cursor:pointer;


}



button:hover{

opacity:.8;

}



.link{


text-align:center;

margin-top:15px;

color:#a5b4fc;

cursor:pointer;


}




/* SEMBUNYIKAN HALAMAN LAIN */


#loginPage,
#registerPage,
#adminPage,
#userPage{

display:none;

}





/* UMUM */


.header{


padding:20px;

text-align:center;


background:

rgba(15,23,42,.8);


backdrop-filter:blur(15px);


}



.container{


max-width:1200px;

margin:auto;

padding:25px;


}



.card{


background:

rgba(255,255,255,.08);


padding:20px;


border-radius:20px;


margin-bottom:20px;


border:

1px solid rgba(255,255,255,.1);


}




.grid{


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));


gap:20px;


}




.product{


background:

rgba(255,255,255,.08);


padding:15px;


border-radius:18px;


}



.product img{


width:100%;


height:250px;


object-fit:cover;


border-radius:15px;


}


</style>

</head>


<body>



<!-- =================
HALAMAN LOGIN
================= -->


<div id="loginPage" class="page">


<div class="box">


<h1 class="logo">
👑 FAHRI STORE
</h1>


<p class="text">
Roblox Fashion Premium
</p>



<input id="loginEmail"
placeholder="Email">


<input id="loginPassword"
type="password"
placeholder="Password">



<button onclick="login()">

LOGIN

</button>



<div class="link"
onclick="showRegister()">

Belum punya akun? DAFTAR

</div>



<p id="loginMsg"></p>


</div>


</div>







<!-- =================
HALAMAN DAFTAR
================= -->


<div id="registerPage" class="page">


<div class="box">


<h1 class="logo">
BUAT AKUN
</h1>



<input id="regUsername"
placeholder="Username">


<input id="regEmail"
placeholder="Email">


<input id="regPassword"
type="password"
placeholder="Password">



<button onclick="register()">

DAFTAR

</button>



<div class="link"
onclick="showLogin()">

Sudah punya akun? LOGIN

</div>



<p id="regMsg"></p>



</div>


</div>

<!-- ======================
ADMIN DASHBOARD
====================== -->


<div id="adminPage">


<div class="header">

<h1>
👑 FAHRI ADMIN PANEL
</h1>


<button onclick="logout()">
🚪 LOGOUT
</button>


</div>




<div class="container">



<div class="grid">


<div class="card">

<h3>📦 PRODUK</h3>

<h1 id="totalProduct">
0
</h1>

</div>



<div class="card">

<h3>👥 USER</h3>

<h1 id="totalUser">
0
</h1>

</div>



<div class="card">

<h3>🛒 ORDER</h3>

<h1 id="totalOrder">
0
</h1>

</div>



<div class="card">

<h3>👁️ VISITOR</h3>

<h1 id="totalVisit">
0
</h1>

</div>


</div>








<!-- TAMBAH PRODUK -->


<div class="card">


<h2>
📦 Kelola Produk
</h2>



<input id="productId"
type="hidden">



<input id="productName"
placeholder="Nama Produk">



<select id="productType">

<option>Baju</option>

<option>Celana</option>

<option>Setelan</option>

</select>



<input id="productPrice"
placeholder="Harga Robux">



<input id="productImage"
placeholder="Link Gambar">



<input id="productLink"
placeholder="Link Pembelian Roblox">



<button onclick="saveProduct()">

SIMPAN PRODUK

</button>


</div>








<div class="card">


<h2>
📦 Semua Produk
</h2>


<div id="adminProducts"
class="grid">

</div>


</div>








<!-- ORDER -->


<div class="card">


<h2>
🛒 Semua Order
</h2>



<div id="orders">

</div>


</div>








<!-- USER -->


<div class="card">


<h2>
👥 Semua User
</h2>


<div id="users">

</div>


</div>




</div>



</div>









<!-- ======================
USER STORE
====================== -->


<div id="userPage">



<div class="header">


<h1>
🛍️ FAHRI FASHION STORE
</h1>



<button onclick="logout()">

🚪 LOGOUT

</button>


</div>





<div class="container">


<div class="card">


<h2>
🔥 KATALOG OUTFIT
</h2>



<div id="products"
class="grid">

</div>



</div>


</div>



    </div>
    
<script type="module">


import { initializeApp }

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

collection,

addDoc,

getDocs,

doc,

setDoc,

getDoc,

updateDoc,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {


apiKey:
"AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",


authDomain:
"fashion-fahri-39262.firebaseapp.com",


projectId:
"fashion-fahri-39262",


storageBucket:
"fashion-fahri-39262.firebasestorage.app",


messagingSenderId:
"647011821518",


appId:
"1:647011821518:web:279811ff7821e75bf32d9f",


measurementId:
"G-4491S31VK2"

};




const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);



const db =
getFirestore(app);







// =================
// ADMIN ACCOUNT
// =================


const ADMIN_EMAIL =
"Fahri@admin.com";


const ADMIN_PASSWORD =
"Fahz121108";








// =================
// PINDAH HALAMAN
// =================



window.showLogin=function(){


loginPage.style.display="flex";


registerPage.style.display="none";


};



window.showRegister=function(){


loginPage.style.display="none";


registerPage.style.display="flex";


};





showLogin();








// =================
// REGISTER
// =================



window.register = async function(){


try{


let username =
regUsername.value;


let email =
regEmail.value;


let password =
regPassword.value;



let akun =

await createUserWithEmailAndPassword(

auth,

email,

password

);





await setDoc(

doc(

db,

"users",

akun.user.uid

),

{


username:username,


email:email,


role:"user",


created:new Date()


}

);




alert(
"Akun berhasil dibuat"
);





registerPage.style.display="none";


userPage.style.display="block";


loadProducts();



}catch(e){


alert(e.message);


}



};








// =================
// LOGIN
// =================



window.login = async function(){


try{


let email =
loginEmail.value;


let password =
loginPassword.value;




await signInWithEmailAndPassword(

auth,

email,

password

);







if(

email===ADMIN_EMAIL &&

password===ADMIN_PASSWORD

){



loginPage.style.display="none";


adminPage.style.display="block";



loadAdmin();


loadStatistics();



}

else{



loginPage.style.display="none";


userPage.style.display="block";



loadProducts();



}




}catch(e){



alert(
"Login gagal : "+e.message
);



}



};








// =================
// LOGOUT
// =================



window.logout = async function(){


await signOut(auth);


location.reload();


};
    
// =======================
// SIMPAN PRODUK ADMIN
// =======================


window.saveProduct = async function(){


let id = productId.value;



let data = {


nama:
productName.value,


tipe:
productType.value,


harga:
productPrice.value,


gambar:
productImage.value,


link:
productLink.value


};




if(id){


await updateDoc(

doc(db,"products",id),

data

);



alert("Produk berhasil diubah");


}else{


await addDoc(

collection(db,"products"),

data

);



alert("Produk berhasil ditambah");


}




productId.value="";

productName.value="";

productPrice.value="";

productImage.value="";

productLink.value="";



loadAdmin();


};








// =======================
// TAMPIL PRODUK ADMIN
// =======================



window.loadAdmin = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";



data.forEach(item=>{


let p=item.data();



html+=`


<div class="product">


<img src="${p.gambar}">


<h3>
${p.nama}
</h3>


<p>
${p.tipe}
</p>


<p>
💎 ${p.harga} Robux
</p>



<button onclick="editProduct('${item.id}')">

✏️ Edit

</button>



<button onclick="hapusProduct('${item.id}')">

🗑 Hapus

</button>



</div>


`;


});



adminProducts.innerHTML=html;



};








// =======================
// EDIT PRODUK
// =======================


window.editProduct = async function(id){


let data = await getDoc(

doc(db,"products",id)

);



let p=data.data();



productId.value=id;


productName.value=p.nama;


productType.value=p.tipe;


productPrice.value=p.harga;


productImage.value=p.gambar;


productLink.value=p.link;



};








// =======================
// HAPUS PRODUK
// =======================



window.hapusProduct = async function(id){



if(confirm("Hapus produk ini?")){


await deleteDoc(

doc(db,"products",id)

);



loadAdmin();



}



};








// =======================
// STORE USER
// =======================



window.loadProducts = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";



data.forEach(item=>{


let p=item.data();



html+=`


<div class="product">


<img src="${p.gambar}">


<h3>

${p.nama}

</h3>



<p>

${p.tipe}

</p>



<p>

💎 ${p.harga} Robux

</p>




<button onclick="orderProduct(
'${p.nama}',
'${p.harga}',
'${p.link}'
)">


🛒 ORDER


</button>




</div>



`;



});



products.innerHTML=html;


};









// =======================
// ORDER
// =======================



window.orderProduct = async function(
nama,
harga,
link
){



let user =
auth.currentUser;



await addDoc(

collection(db,"orders"),

{


user:user.email,


produk:nama,


harga:harga,


status:"Pending",


tanggal:new Date()


}


);





alert(
"Order berhasil dibuat, status Pending"
);





// LANGSUNG ARAH LINK

window.open(

link,

"_blank"

);



};
    
// =======================
// STATISTIK ADMIN
// =======================


window.loadStatistics = async function(){


let produk = await getDocs(
collection(db,"products")
);


let user = await getDocs(
collection(db,"users")
);


let order = await getDocs(
collection(db,"orders")
);



totalProduct.innerHTML =
produk.size;


totalUser.innerHTML =
user.size;


totalOrder.innerHTML =
order.size;



loadOrders();

loadUsers();

loadVisitor();



};







// =======================
// DAFTAR ORDER ADMIN
// =======================


async function loadOrders(){


let data = await getDocs(

collection(db,"orders")

);



let html="";



data.forEach(item=>{


let o=item.data();



html+=`


<div class="card">


<h3>
🛒 ORDER
</h3>


<p>
👤 User:
${o.user}
</p>



<p>
📦 Produk:
${o.produk}
</p>



<p>
💎 Harga:
${o.harga} Robux
</p>



<p>
Status:
<b>${o.status}</b>
</p>



<button onclick="ubahStatus('${item.id}','Sukses')">

✅ SUKSES

</button>



<button onclick="ubahStatus('${item.id}','Batal')">

❌ BATAL

</button>



</div>


`;



});



orders.innerHTML=html;


}







window.ubahStatus = async function(id,status){


await updateDoc(

doc(db,"orders",id),

{

status:status

}

);



loadOrders();


};









// =======================
// DAFTAR USER ADMIN
// =======================


async function loadUsers(){


let data = await getDocs(

collection(db,"users")

);



let html="";



data.forEach(item=>{


let u=item.data();



html+=`


<div class="card">


<h3>
👤 ${u.username}
</h3>



<p>
📧 ${u.email}
</p>



<p>
Role:
${u.role}
</p>



</div>


`;



});



users.innerHTML=html;



}









// =======================
// TOTAL KUNJUNGAN
// =======================


async function addVisitor(){


let ref = doc(

db,

"stats",

"visitor"

);



let data = await getDoc(ref);



if(data.exists()){


await updateDoc(

ref,

{

jumlah:
data.data().jumlah+1

}

);



}else{


await setDoc(

ref,

{

jumlah:1

}

);



}



}





async function loadVisitor(){


let data = await getDoc(

doc(db,"stats","visitor")

);



if(data.exists()){


totalVisit.innerHTML =
data.data().jumlah;


}



}



addVisitor();



</script>


</body>

</html>
