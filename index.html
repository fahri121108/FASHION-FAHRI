<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FAHRI FASHION STORE</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;

min-height:100vh;

color:white;

background:

radial-gradient(circle at top,#6366f1,transparent 35%),
linear-gradient(
135deg,
#050816,
#111827,
#1e1b4b
);

}


/* LOGIN REGISTER */

.page{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



.panel{

width:380px;

padding:35px;

border-radius:25px;

background:

rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:

1px solid rgba(255,255,255,.15);

box-shadow:

0 0 40px rgba(99,102,241,.5);

}



.logo{

text-align:center;

font-size:32px;

font-weight:bold;

background:

linear-gradient(
90deg,
#60a5fa,
#c084fc
);

-webkit-background-clip:text;

color:transparent;

}



.desc{

text-align:center;

color:#cbd5e1;

margin-bottom:20px;

}



input,
select{


width:100%;

padding:14px;

margin-top:12px;

border-radius:12px;

border:none;

outline:none;

background:

rgba(0,0,0,.35);

color:white;

}



button{


width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

color:white;


background:

linear-gradient(
90deg,
#4f46e5,
#9333ea
);


}



button:hover{

opacity:.85;

}



.switch{

text-align:center;

margin-top:15px;

color:#a5b4fc;

cursor:pointer;

}




/* DASHBOARD */

#loginPage,
#registerPage,
#adminPage,
#userPage{

display:none;

}



.header{

padding:20px;

text-align:center;

background:

rgba(15,23,42,.8);

backdrop-filter:blur(15px);

}



.container{

padding:25px;

max-width:1200px;

margin:auto;

}



.card{

background:

rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

margin-bottom:20px;

border:

1px solid rgba(255,255,255,.1);

}




.grid{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}




.product{

background:

rgba(255,255,255,.08);

padding:15px;

border-radius:18px;

}



.product img{

width:100%;

height:250px;

object-fit:cover;

border-radius:15px;

}



.stat{

background:

linear-gradient(
135deg,
#1e293b,
#312e81
);

padding:20px;

border-radius:20px;

}



</style>

</head>


<body>


<!-- LOGIN -->


<div id="loginPage" class="page">


<div class="panel">


<h1 class="logo">
👑 FAHRI STORE
</h1>


<p class="desc">
Roblox Fashion Premium
</p>



<input id="loginEmail"
placeholder="Email">



<input id="loginPassword"
type="password"
placeholder="Password">



<button onclick="login()">

LOGIN

</button>



<p class="switch"
onclick="showRegister()">

Belum punya akun? DAFTAR

</p>



<p id="loginMsg"></p>


</div>


</div>





<!-- REGISTER -->


<div id="registerPage" class="page">


<div class="panel">


<h1 class="logo">
DAFTAR AKUN
</h1>



<input id="regUsername"
placeholder="Username">



<input id="regEmail"
placeholder="Email">



<input id="regPassword"
type="password"
placeholder="Password">



<button onclick="register()">

BUAT AKUN

</button>



<p class="switch"
onclick="showLogin()">

Sudah punya akun? LOGIN

</p>



<p id="regMsg"></p>


</div>
<!-- =====================
ADMIN PAGE
===================== -->

<div id="adminPage">


<div class="header">

<h1>
👑 FAHRI ADMIN PANEL
</h1>


<button onclick="logout()">
🚪 LOGOUT
</button>


</div>



<div class="container">


<div class="grid">


<div class="stat">

<h3>
📦 Produk
</h3>

<h1 id="statProduct">
0
</h1>

</div>



<div class="stat">

<h3>
👥 User
</h3>

<h1 id="statUser">
0
</h1>

</div>



<div class="stat">

<h3>
🛒 Order
</h3>

<h1 id="statOrder">
0
</h1>

</div>



<div class="stat">

<h3>
👁️ Kunjungan
</h3>

<h1 id="statVisit">
0
</h1>

</div>


</div>





<!-- PRODUK -->


<div class="card">


<h2>
📦 Kelola Produk
</h2>


<input id="editId"
type="hidden">



<input id="productName"
placeholder="Nama Outfit">



<select id="productType">

<option>Baju</option>

<option>Celana</option>

<option>Setelan</option>

</select>



<input id="productPrice"
placeholder="Harga Robux">



<input id="productImage"
placeholder="Link Gambar">



<input id="productLink"
placeholder="Link Pembelian">



<button onclick="saveProduct()">

SIMPAN PRODUK

</button>


</div>





<div class="card">


<h2>
📦 Daftar Produk
</h2>


<div id="adminProductList"
class="grid">

</div>


</div>





<!-- ORDER -->


<div class="card">


<h2>
🛒 Daftar Order
</h2>


<div id="orderList">

</div>


</div>





<!-- USER -->


<div class="card">


<h2>
👥 Daftar User
</h2>


<div id="userList">

</div>


</div>



</div>


</div>







<!-- =====================
USER STORE
===================== -->


<div id="userPage">


<div class="header">


<h1>
🛍️ FAHRI FASHION STORE
</h1>



<button onclick="logout()">

🚪 LOGOUT

</button>



</div>





<div class="container">


<div class="card">


<h2>
🔥 KATALOG OUTFIT
</h2>


<div id="storeList"
class="grid">

</div>


</div>



</div>


    </div>
    <script type="module">


import { initializeApp }

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

collection,

addDoc,

getDocs,

doc,

setDoc,

getDoc,

updateDoc,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {


apiKey:
"AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",


authDomain:
"fashion-fahri-39262.firebaseapp.com",


projectId:
"fashion-fahri-39262",


storageBucket:
"fashion-fahri-39262.firebasestorage.app",


messagingSenderId:
"647011821518",


appId:
"1:647011821518:web:279811ff7821e75bf32d9f",


measurementId:
"G-4491S31VK2"


};



const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);



const db =
getFirestore(app);





// AKUN ADMIN

const ADMIN_EMAIL =
"Fahri@admin.com";


const ADMIN_PASSWORD =
"Fahz121108";








// TAMPIL LOGIN


window.showLogin=function(){

document.getElementById("loginPage")
.style.display="flex";


document.getElementById("registerPage")
.style.display="none";


};





// TAMPIL REGISTER


window.showRegister=function(){

document.getElementById("loginPage")
.style.display="none";


document.getElementById("registerPage")
.style.display="flex";


};





showLogin();







// REGISTER


window.register=async function(){


try{


let username =
document.getElementById("regUsername").value;



let email =
document.getElementById("regEmail").value;



let password =
document.getElementById("regPassword").value;




let user =

await createUserWithEmailAndPassword(

auth,

email,

password

);





await setDoc(

doc(

db,

"users",

user.user.uid

),

{


username:username,

email:email,

role:"user",

createdAt:new Date()


}

);



alert(
"Akun berhasil dibuat"
);



// langsung masuk user store

document.getElementById("registerPage")
.style.display="none";


document.getElementById("userPage")
.style.display="block";


loadStore();



}catch(e){


alert(e.message);


}


};







// LOGIN


window.login=async function(){


try{


let email =

document.getElementById("loginEmail").value;



let password =

document.getElementById("loginPassword").value;




await signInWithEmailAndPassword(

auth,

email,

password

);





if(

email === ADMIN_EMAIL &&

password === ADMIN_PASSWORD

){


document.getElementById("loginPage")
.style.display="none";


document.getElementById("adminPage")
.style.display="block";


loadAdmin();

loadStatistics();


}

else{


document.getElementById("loginPage")
.style.display="none";


document.getElementById("userPage")
.style.display="block";


loadStore();


}



}catch(e){


alert(
"Login gagal : "+e.message
);


}


};







// LOGOUT


window.logout=async function(){


await signOut(auth);


location.reload();


};
        
// =======================
// PRODUK ADMIN
// =======================


window.saveProduct = async function(){


let id =

document.getElementById("editId").value;



let data = {


nama:
document.getElementById("productName").value,


type:
document.getElementById("productType").value,


harga:
document.getElementById("productPrice").value,


gambar:
document.getElementById("productImage").value,


link:
document.getElementById("productLink").value


};




if(id){


await updateDoc(

doc(db,"products",id),

data

);



alert("Produk berhasil diubah");


}

else{


await addDoc(

collection(db,"products"),

data

);



alert("Produk berhasil ditambah");


}



loadAdmin();


};






window.loadAdmin = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";


data.forEach(item=>{


let p=item.data();



html += `


<div class="product">


<img src="${p.gambar}">


<h3>${p.nama}</h3>


<p>${p.type}</p>


<p>💎 ${p.harga} Robux</p>



<button onclick="editProduct('${item.id}')">

✏️ EDIT

</button>



<button onclick="deleteProduct('${item.id}')">

🗑️ HAPUS

</button>



</div>


`;



});



document.getElementById("adminProductList")
.innerHTML=html;



};








window.editProduct = async function(id){


let data = await getDoc(

doc(db,"products",id)

);



let p=data.data();



document.getElementById("editId").value=id;


document.getElementById("productName").value=p.nama;


document.getElementById("productType").value=p.type;


document.getElementById("productPrice").value=p.harga;


document.getElementById("productImage").value=p.gambar;


document.getElementById("productLink").value=p.link;



};







window.deleteProduct = async function(id){


if(confirm("Hapus produk ini?")){


await deleteDoc(

doc(db,"products",id)

);



loadAdmin();


}



};









// =======================
// STORE USER
// =======================


window.loadStore = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";



data.forEach(item=>{


let p=item.data();



html += `


<div class="product">


<img src="${p.gambar}">


<h3>${p.nama}</h3>


<p>${p.type}</p>


<p>💎 ${p.harga} Robux</p>



<button onclick="orderProduct('${p.nama}','${p.harga}','${p.link}')">

🛒 ORDER

</button>



</div>


`;



});



document.getElementById("storeList")
.innerHTML=html;


};








// =======================
// ORDER
// =======================


window.orderProduct = async function(
nama,
harga,
link
){



let user = auth.currentUser;



await addDoc(

collection(db,"orders"),

{


user:user.email,


produk:nama,


harga:harga,


status:"Pending",


tanggal:new Date()


}

);




alert(
"Order berhasil, status Pending"
);



window.open(

link,

"_blank"

);



};
        

    </div>
    
// =======================
// STATISTIK ADMIN
// =======================


async function loadStatistics(){


let products = await getDocs(

collection(db,"products")

);



let users = await getDocs(

collection(db,"users")

);



let orders = await getDocs(

collection(db,"orders")

);



document.getElementById("statProduct")
.innerHTML =
products.size;



document.getElementById("statUser")
.innerHTML =
users.size;



document.getElementById("statOrder")
.innerHTML =
orders.size;



loadOrders();

loadUsers();

loadVisit();


}







// =======================
// ORDER ADMIN
// =======================


async function loadOrders(){


let data = await getDocs(

collection(db,"orders")

);



let html="";



data.forEach(item=>{


let o=item.data();



html += `


<div class="card">


<p>
👤 User:
${o.user}
</p>


<p>
📦 Produk:
${o.produk}
</p>


<p>
💎 Harga:
${o.harga} Robux
</p>


<p>
Status:
<b>${o.status}</b>
</p>



<button onclick="successOrder('${item.id}')">

✅ SUKSES

</button>



<button onclick="cancelOrder('${item.id}')">

❌ BATAL

</button>


</div>


`;



});



document.getElementById("orderList")
.innerHTML=html;



}







window.successOrder = async function(id){


await updateDoc(

doc(db,"orders",id),

{

status:"Sukses"

}

);



loadOrders();


};






window.cancelOrder = async function(id){


await updateDoc(

doc(db,"orders",id),

{

status:"Batal"

}

);



loadOrders();


};







// =======================
// DATA USER ADMIN
// =======================


async function loadUsers(){


let data = await getDocs(

collection(db,"users")

);



let html="";



data.forEach(item=>{


let u=item.data();



html += `


<div class="card">


<p>
👤 ${u.username}
</p>


<p>
📧 ${u.email}
</p>


<p>
Role:
${u.role}
</p>



</div>


`;



});



document.getElementById("userList")
.innerHTML=html;



}








// =======================
// TOTAL KUNJUNGAN
// =======================


async function addVisit(){


let ref = doc(

db,

"stats",

"visitor"

);



let data = await getDoc(ref);



if(data.exists()){


await updateDoc(

ref,

{

jumlah:
data.data().jumlah + 1

}

);


}else{


await setDoc(

ref,

{

jumlah:1

}

);


}



}




async function loadVisit(){


let data = await getDoc(

doc(db,"stats","visitor")

);



if(data.exists()){


document.getElementById("statVisit")
.innerHTML =
data.data().jumlah;


}


}




addVisit();





</script>


</body>

</html>
