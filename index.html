<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FAHRI FASHION STORE</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

margin:0;
min-height:100vh;
color:white;

background:
radial-gradient(circle at top,#4338ca,transparent 35%),
linear-gradient(
135deg,
#050816,
#111827,
#1e1b4b
);

}


/* =================
LOGIN
================= */


#authPage{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}



.login-panel{

width:380px;

padding:35px;

border-radius:25px;

background:

rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:

1px solid rgba(255,255,255,.15);

box-shadow:

0 0 40px rgba(99,102,241,.5);

}



.logo{

text-align:center;

font-size:32px;

font-weight:bold;

background:

linear-gradient(
90deg,
#60a5fa,
#c084fc
);

-webkit-background-clip:text;

color:transparent;

}



.subtitle{

text-align:center;

color:#cbd5e1;

}



input,
select{

width:100%;

padding:14px;

margin-top:12px;

border-radius:14px;

border:none;

outline:none;

background:

rgba(0,0,0,.35);

color:white;

border:

1px solid rgba(255,255,255,.15);

}



button{

width:100%;

padding:14px;

margin-top:15px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:bold;

color:white;

background:

linear-gradient(
90deg,
#4f46e5,
#9333ea
);


transition:.3s;

}



button:hover{

transform:translateY(-2px);

box-shadow:

0 0 20px #9333ea;

}



#msg{

text-align:center;

}



/* =================
GLOBAL PANEL
================= */


#adminPage,
#userPage{

display:none;

}



.header{

padding:20px;

background:

rgba(15,23,42,.8);

backdrop-filter:blur(15px);

border-bottom:

1px solid rgba(255,255,255,.1);

text-align:center;

}



.container{

max-width:1200px;

margin:auto;

padding:25px;

}



.card{

background:

rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:20px;

border-radius:20px;

margin-bottom:20px;

border:

1px solid rgba(255,255,255,.1);

}



.grid{

display:grid;

grid-template-columns:

repeat(auto-fill,minmax(220px,1fr));

gap:20px;

}



.product{

background:

rgba(255,255,255,.08);

padding:15px;

border-radius:18px;

}



.product img{

width:100%;

height:250px;

object-fit:cover;

border-radius:15px;

}
    </style>

</head>


<body>


<!-- =================
LOGIN PAGE
================= -->

<div id="authPage">


<div class="login-panel">


<h1 class="logo">
👑 FAHRI STORE
</h1>


<p class="subtitle">
Roblox Fashion Premium
</p>


<input id="email"
placeholder="Email">


<input id="password"
type="password"
placeholder="Password">



<button onclick="login()">
LOGIN
</button>



<button onclick="register()">
DAFTAR
</button>



<p id="msg"></p>


</div>


</div>





<!-- =================
ADMIN PAGE
================= -->


<div id="adminPage">



<div class="header">


<h1>
👑 ADMIN DASHBOARD
</h1>


<button onclick="logout()">
🚪 LOGOUT
</button>


</div>



<div class="container">


<div class="grid">



<div class="card">

<h3>
📦 Produk
</h3>

<h1 id="totalProduk">
0
</h1>

</div>



<div class="card">

<h3>
👥 User
</h3>

<h1 id="totalUser">
0
</h1>

</div>



<div class="card">

<h3>
🛒 Order
</h3>

<h1 id="totalOrder">
0
</h1>

</div>



<div class="card">

<h3>
👁️ Kunjungan
</h3>

<h1 id="totalVisit">
0
</h1>

</div>


</div>





<div class="card">


<h2>
➕ Tambah / Edit Produk
</h2>



<input id="productId"
type="hidden">



<input id="namaProduk"
placeholder="Nama Outfit">



<select id="kategoriProduk">

<option>Baju</option>

<option>Celana</option>

<option>Setelan</option>

</select>



<input id="hargaProduk"
placeholder="Harga Robux">



<input id="gambarProduk"
placeholder="Link Thumbnail">



<input id="linkProduk"
placeholder="Link Roblox">



<button onclick="saveProduct()">

SIMPAN PRODUK

</button>


</div>






<div class="card">


<h2>
📦 Semua Produk
</h2>


<div id="adminProducts"
class="grid">

</div>


</div>





<div class="card">


<h2>
🛒 Semua Order
</h2>


<div id="orderList">

</div>


</div>



</div>


</div>







<!-- =================
USER STORE
================= -->


<div id="userPage">



<div class="header">


<h1>
🛍️ FAHRI FASHION STORE
</h1>


<button onclick="logout()">

🚪 LOGOUT

</button>


</div>





<div class="container">



<div class="card">


<h2>
🔥 Katalog Outfit
</h2>



<div id="userProducts"
class="grid">

</div>



</div>



</div>



</div>
<script type="module">


import { initializeApp }

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

collection,

addDoc,

getDocs,

doc,

getDoc,

setDoc,

updateDoc,

deleteDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {


apiKey:
"AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",


authDomain:
"fashion-fahri-39262.firebaseapp.com",


projectId:
"fashion-fahri-39262",


storageBucket:
"fashion-fahri-39262.firebasestorage.app",


messagingSenderId:
"647011821518",


appId:
"1:647011821518:web:279811ff7821e75bf32d9f",


measurementId:
"G-4491S31VK2"

};



const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);



const db =
getFirestore(app);





/* ADMIN */

const ADMIN_EMAIL =
"Fahri@admin.com";


const ADMIN_PASSWORD =
"Fahz121108";







/* REGISTER */


window.register = async function(){


try{


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;



let user =

await createUserWithEmailAndPassword(

auth,

email,

password

);



await setDoc(

doc(
db,
"users",
user.user.uid
),

{

email:email,

role:"user",

tanggal:new Date()

}

);



alert(
"Akun berhasil dibuat"
);



}catch(e){


alert(e.message);


}



};








/* LOGIN */


window.login = async function(){


try{


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;



await signInWithEmailAndPassword(

auth,

email,

password

);





if(

email === ADMIN_EMAIL &&

password === ADMIN_PASSWORD

){



document.getElementById("authPage")
.style.display="none";



document.getElementById("adminPage")
.style.display="block";



loadAdminProducts();

loadOrders();

statistik();


}

else{



document.getElementById("authPage")
.style.display="none";



document.getElementById("userPage")
.style.display="block";



loadUserProducts();


}



}catch(e){


alert(
"Login gagal : "+e.message
);


}



};






/* LOGOUT */


window.logout = async function(){


await signOut(auth);


location.reload();


};
    


// ======================
// PRODUK ADMIN
// ======================


window.saveProduct = async function(){


let id =
document.getElementById("productId").value;


let data = {


nama:
document.getElementById("namaProduk").value,


kategori:
document.getElementById("kategoriProduk").value,


harga:
document.getElementById("hargaProduk").value,


gambar:
document.getElementById("gambarProduk").value,


link:
document.getElementById("linkProduk").value


};




if(id){


await updateDoc(

doc(db,"products",id),

data

);


alert("Produk berhasil diubah");


}else{


await addDoc(

collection(db,"products"),

data

);


alert("Produk berhasil ditambah");


}



loadAdminProducts();



};







window.loadAdminProducts = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";

let total=0;



data.forEach(item=>{


total++;


let p=item.data();



html += `


<div class="product">


<img src="${p.gambar}">


<h3>${p.nama}</h3>


<p>${p.kategori}</p>


<p>💎 ${p.harga} Robux</p>



<button onclick="editProduct('${item.id}')">
✏️ EDIT
</button>


<button onclick="hapusProduct('${item.id}')">
🗑 HAPUS
</button>


</div>


`;



});



document.getElementById("adminProducts").innerHTML=html;


document.getElementById("totalProduk").innerHTML=total;


};







window.editProduct = async function(id){


let data = await getDoc(

doc(db,"products",id)

);



let p=data.data();



document.getElementById("productId").value=id;


document.getElementById("namaProduk").value=p.nama;


document.getElementById("kategoriProduk").value=p.kategori;


document.getElementById("hargaProduk").value=p.harga;


document.getElementById("gambarProduk").value=p.gambar;


document.getElementById("linkProduk").value=p.link;



};






window.hapusProduct = async function(id){


if(confirm("Hapus produk ini?")){


await deleteDoc(

doc(db,"products",id)

);



loadAdminProducts();


}


};








// ======================
// USER PRODUK
// ======================


window.loadUserProducts = async function(){


let data = await getDocs(

collection(db,"products")

);



let html="";



data.forEach(item=>{


let p=item.data();



html += `


<div class="product">


<img src="${p.gambar}">


<h3>${p.nama}</h3>


<p>${p.kategori}</p>


<p>💎 ${p.harga} Robux</p>



<button onclick="order('${p.nama}','${p.harga}')">

🛒 ORDER

</button>


</div>


`;



});



document.getElementById("userProducts").innerHTML=html;


};








// ======================
// ORDER
// ======================


window.order = async function(nama,harga){


let user = auth.currentUser;



await addDoc(

collection(db,"orders"),

{


user:user.email,


produk:nama,


harga:harga,


status:"Pending",


tanggal:new Date()


}


);



alert("Order berhasil dibuat");


};








// ======================
// STATISTIK
// ======================


async function statistik(){


let produk = await getDocs(

collection(db,"products")

);


let user = await getDocs(

collection(db,"users")

);


let order = await getDocs(

collection(db,"orders")

);



document.getElementById("totalProduk").innerHTML =
produk.size;


document.getElementById("totalUser").innerHTML =
user.size;


document.getElementById("totalOrder").innerHTML =
order.size;



}




// ======================
// KUNJUNGAN
// ======================


async function visit(){


let ref =
doc(db,"stats","visit");


let data =
await getDoc(ref);



if(data.exists()){


await updateDoc(

ref,

{

jumlah:
data.data().jumlah+1

}

);


}else{


await setDoc(

ref,

{

jumlah:1

}

);


}



}



async function loadVisit(){


let data =
await getDoc(

doc(db,"stats","visit")

);



if(data.exists()){


document.getElementById("totalVisit").innerHTML =
data.data().jumlah;


}


}



visit();

loadVisit();

async function loadOrders(){

    let data = await getDocs(
        collection(db,"orders")
    );

    let html = "";

    data.forEach(item=>{

        let o = item.data();

        html += `

        <div class="product">

        <h3>🛒 Order</h3>

        <p>
        👤 User:
        ${o.user}
        </p>

        <p>
        📦 Produk:
        ${o.produk}
        </p>

        <p>
        💎 Harga:
        ${o.harga} Robux
        </p>

        <p>
        Status:
        ${o.status}
        </p>

        </div>

        `;

    });


    document.getElementById("orderList").innerHTML = html;

    }

</script>


</body>

</html>
