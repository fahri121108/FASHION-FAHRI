<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FAHRI FASHION STORE</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

margin:0;

background:
linear-gradient(
135deg,
#080b16,
#111936,
#210d36
);

color:white;

}



/* LOGIN */

.login-page{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

}



.login-box{

width:350px;

background:
rgba(25,30,55,.9);

padding:25px;

border-radius:20px;

box-shadow:
0 0 30px rgba(99,102,241,.4);

}



h1{

text-align:center;

background:
linear-gradient(
90deg,
#60a5fa,
#c084fc
);

-webkit-background-clip:text;

color:transparent;

}



input,
select{

width:100%;

padding:13px;

margin-top:10px;

border:none;

border-radius:12px;

background:#0b1224;

color:white;

}



button{

width:100%;

padding:13px;

margin-top:10px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

color:white;

background:
linear-gradient(
90deg,
#4f46e5,
#9333ea
);

}



button:hover{

opacity:.8;

}



/* DASHBOARD */


#dashboard{

display:none;

}



.sidebar{

position:fixed;

width:240px;

height:100vh;

background:
rgba(15,20,45,.95);

padding:20px;

border-right:
1px solid #6366f1;

}



.sidebar h2{

text-align:center;

}



.menu button{

margin-top:15px;

}



.main{

margin-left:240px;

padding:25px;

}



.card{

background:
rgba(25,30,55,.9);

padding:20px;

border-radius:20px;

margin-bottom:20px;

border:
1px solid rgba(255,255,255,.1);

}



.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:20px;

}



.stat{

background:
linear-gradient(
135deg,
#1e293b,
#312e81
);

padding:20px;

border-radius:20px;

}



.products{

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));

gap:20px;

}



.product{

background:
rgba(25,30,55,.9);

padding:15px;

border-radius:18px;

}



.product img{

width:100%;

height:250px;

object-fit:cover;

border-radius:15px;

}



</style>

</head>


<body>



<!-- LOGIN -->


<div class="login-page" id="loginPage">


<div class="login-box">


<h1>
FAHRI STORE
</h1>


<p>
Admin Login
</p>


<input id="email"
placeholder="Email Admin">


<input id="password"
type="password"
placeholder="Password">



<button onclick="login()">
LOGIN
</button>



<p id="loginStatus"></p>


</div>


</div>





<!-- DASHBOARD -->


<div id="dashboard">



<div class="sidebar">


<h2>
👑 FAHRI STORE
</h2>



<div class="menu">


<button onclick="showHome()">
🏠 Dashboard
</button>


<button onclick="showProduct()">
📦 Produk
</button>


<button onclick="logout()">
🚪 Logout
</button>


</div>


</div>




<div class="main">


<div class="card">


<h1>
Dashboard Admin
</h1>


<p>
Selamat datang di FAHRI FASHION STORE
</p>


</div>



<div class="stats">


<div class="stat">

<h3>
Total Produk
</h3>

<h1 id="totalProduk">
0
</h1>

</div>



<div class="stat">

<h3>
Kategori
</h3>

<h1>
3
</h1>

</div>



<div class="stat">

<h3>
Status
</h3>

<h1>
ONLINE
</h1>

</div>


</div>
<br>

<div class="card" id="productSection">


<h2>
📦 Tambah Produk Outfit
</h2>



<input id="namaProduk"
placeholder="Nama Outfit">



<select id="kategori">

<option>Baju</option>

<option>Celana</option>

<option>Setelan</option>

</select>



<input id="hargaProduk"
placeholder="Harga Robux">



<input id="gambarProduk"
placeholder="Link Gambar">



<input id="linkProduk"
placeholder="Link Roblox">



<button onclick="tambahProduk()">

+ Tambah Produk

</button>


</div>





<div class="card">


<h2>
🔥 Semua Produk
</h2>


<div id="produkList" class="products">

</div>


</div>




</div>


</div>





<script type="module">


import { initializeApp }

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

collection,

addDoc,

getDocs

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





/* FIREBASE */


const firebaseConfig = {


apiKey:
"AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",


authDomain:
"fashion-fahri-39262.firebaseapp.com",


projectId:
"fashion-fahri-39262",


storageBucket:
"fashion-fahri-39262.firebasestorage.app",


messagingSenderId:
"647011821518",


appId:
"1:647011821518:web:279811ff7821e75bf32d9f",


measurementId:
"G-4491S31VK2"


};




const app =
initializeApp(firebaseConfig);



const auth =
getAuth(app);



const db =
getFirestore(app);






/* ADMIN */


const ADMIN_EMAIL =
"Fahri@admin.com";



const ADMIN_PASSWORD =
"Fahz121108";







/* LOGIN */


window.login =
async function(){


try{


let email =
document.getElementById("email").value;



let password =
document.getElementById("password").value;




await signInWithEmailAndPassword(

auth,

email,

password

);




if(email === ADMIN_EMAIL){



document.getElementById("loginPage")
.style.display="none";



document.getElementById("dashboard")
.style.display="block";



loadProduk();



}else{


alert("Bukan akun admin");


}




}catch(e){



alert(
"Login gagal : "+e.message
);



}



};







/* LOGOUT */


window.logout =
async function(){


await signOut(auth);



location.reload();


};







/* TAMBAH PRODUK */


window.tambahProduk =
async function(){


await addDoc(

collection(
db,
"outfits"
),


{


nama:
document.getElementById("namaProduk").value,


kategori:
document.getElementById("kategori").value,


harga:
document.getElementById("hargaProduk").value,


gambar:
document.getElementById("gambarProduk").value,


link:
document.getElementById("linkProduk").value



}



);



alert(
"Produk berhasil ditambahkan"
);



loadProduk();


};
   
/* LOAD PRODUK */

async function loadProduk(){


const data =
await getDocs(

collection(
db,
"outfits"
)

);



let html = "";

let jumlah = 0;



data.forEach(doc=>{


let p = doc.data();


jumlah++;



html += `


<div class="product">


<img src="${p.gambar}">


<h3>
${p.nama}
</h3>


<p>
Kategori : ${p.kategori}
</p>


<p>
💎 ${p.harga} Robux
</p>


<a href="${p.link}" target="_blank">


<button>
BELI ROBLOX
</button>


</a>



</div>



`;



});



document.getElementById("produkList").innerHTML =
html;



document.getElementById("totalProduk").innerHTML =
jumlah;



}






/* MENU DASHBOARD */


window.showHome =
function(){


document.getElementById("productSection")
.style.display="none";


}



window.showProduct =
function(){


document.getElementById("productSection")
.style.display="block";


}





</script>



</body>

</html>
