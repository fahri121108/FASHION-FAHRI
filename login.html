<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FAHRI STORE</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(11,16,32,.85),
    rgba(11,16,32,.85)),
    url("https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1200");
    background-size:cover;
    background-position:center;
}

.card{
    width:95%;
    max-width:420px;
    background:#111827;
    padding:35px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(37,99,235,.3);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:#4da3ff;
    font-size:32px;
}

.logo p{
    color:#bfc8d4;
    margin-top:8px;
}

.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    background:#1f2937;
    color:white;
    border-radius:12px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.btn:hover{
    background:#1d4ed8;
}

.info{
    text-align:center;
    margin-top:20px;
    color:#bfc8d4;
}

.info a{
    color:#4da3ff;
    text-decoration:none;
}

.loading{
    display:none;
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">
        <h1>
            <i class="fa-solid fa-store"></i>
            FAHRI STORE
        </h1>
        <p>Login ke akun kamu</p>
    </div>

    <div class="input-box">
        <label>Email</label>
        <input type="email"
        id="email"
        placeholder="Masukkan email">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input type="password"
        id="password"
        placeholder="Masukkan password">
    </div>

    <button class="btn" onclick="login()">
        <i class="fa-solid fa-right-to-bracket"></i>
        Login
    </button>

    <div class="loading" id="loading">
        Sedang login...
    </div>

    <div class="info">
        Belum punya akun?
        <a href="register.html">
            Daftar disini
        </a>
    </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDuQmsUHotG-lW9tm5LKabUyw_ARwt_W2I",
  authDomain: "fashion-fahri-39262.firebaseapp.com",
  projectId: "fashion-fahri-39262",
  storageBucket: "fashion-fahri-39262.firebasestorage.app",
  messagingSenderId: "647011821518",
  appId: "1:647011821518:web:618396799a8fb7c3f32d9f"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login(){

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    document.getElementById("loading")
    .style.display = "block";

    // LOGIN ADMIN
    if(
        email === "fahri@admin.com" &&
        password === "Fahz121108"
    ){
        localStorage.setItem("role","admin");

        alert("Login admin berhasil!");

        location.href =
        "admin/dashboard.html";

        return;
    }

    auth.signInWithEmailAndPassword(
        email,
        password
    )

    .then(async(userCredential)=>{

        let uid =
        userCredential.user.uid;

        let doc =
        await db.collection("users")
        .doc(uid)
        .get();

        let data = doc.data();

        if(data?.role === "vip"){
            localStorage.setItem(
                "role",
                "vip"
            );

            location.href =
            "seller/dashboard.html";
        }
        else{
            localStorage.setItem(
                "role",
                "user"
            );

            location.href =
            "index.html";
        }

    })

    .catch((err)=>{
        alert(err.message);

        document.getElementById(
        "loading"
        ).style.display = "none";
    });
}
</script>

</body>
  </html>
